<!DOCTYPE html>
<html lang="es" class="">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TaskFlow – Gestión de Tareas</title>

  <!-- PWA meta -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#4338ca" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TaskFlow" />
  <meta name="application-name" content="TaskFlow" />
  <meta name="description" content="Gestiona tus tareas con prioridades, etiquetas, calendario y modo oscuro" />
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512x512.png" />

  <script type="importmap">
  {
    "imports": {
      "react":            "https://esm.sh/react@18",
      "react-dom/client": "https://esm.sh/react-dom@18/client",
      "lucide-react":     "https://esm.sh/lucide-react@0.383.0"
    }
  }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes fadeIn   { from { opacity: 0 }                      to { opacity: 1 } }
    @keyframes zoomIn95 { from { opacity:0; transform:scale(.95) } to { opacity:1; transform:scale(1) } }

    .animate-in   { animation-fill-mode: both; }
    .fade-in      { animation-name: fadeIn; }
    .zoom-in-95   { animation-name: zoomIn95; }
    .duration-200 { animation-duration: 200ms; }

    body { margin: 0; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    html { -webkit-tap-highlight-color: transparent; }

    #splash {
      position: fixed; inset: 0; background: #f8fafc;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; z-index: 9999; transition: opacity .4s;
    }
    .dark #splash { background: #0f172a; }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-icon { font-size: 3rem; animation: bounce 1s infinite alternate; }
    @keyframes bounce { to { transform: translateY(-12px); } }
    #splash p { color: #64748b; font-family: system-ui, sans-serif; font-size: .9rem; }

    #install-banner {
      position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
      background: #4338ca; color: white; border-radius: 1rem;
      padding: .75rem 1.25rem; display: flex; align-items: center; gap: .75rem;
      box-shadow: 0 8px 32px rgba(67,56,202,.35); z-index: 1000;
      font-family: system-ui, sans-serif; font-size: .875rem;
      animation: slideUp .3s ease; white-space: nowrap; max-width: calc(100vw - 2rem);
    }
    #install-banner.hidden { display: none; }
    @keyframes slideUp { from { transform:translateX(-50%) translateY(2rem); opacity:0; } to { transform:translateX(-50%) translateY(0); opacity:1; } }
    #install-banner button { background: #6366f1; color: white; border: none; border-radius: .5rem; padding: .4rem .9rem; cursor: pointer; font-weight: 600; font-size: .8rem; flex-shrink: 0; }
    #install-banner button.dismiss { background: transparent; color: #c7d2fe; padding: .4rem .5rem; }
    @media(max-width:768px){
  iframe[src*="ko-fi"],
  div[id*="kofi"],
  div[class*="kofi"] { display:none!important; }
}
  </style>

  <script>
    (function() {
      const dark = localStorage.theme === 'dark' ||
        (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    })();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[PWA] SW:', reg.scope))
          .catch(err => console.warn('[PWA] SW error:', err));
      });
    }
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); deferredPrompt = e;
      const b = document.getElementById('install-banner');
      if (b) b.classList.remove('hidden');
    });
    function installPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; dismissBanner(); });
    }
    function dismissBanner() {
      const b = document.getElementById('install-banner');
      if (b) b.classList.add('hidden');
    }
    window.addEventListener('appinstalled', dismissBanner);
  </script>
</head>
<body>

  <div id="splash">
    <div id="splash-icon">✅</div>
    <p>Cargando TaskFlow…</p>
  </div>

  <div id="install-banner" class="hidden">
    <span>📲 Instalar TaskFlow como app</span>
    <button onclick="installPWA()">Instalar</button>
    <button class="dismiss" onclick="dismissBanner()">✕</button>
  </div>

  <div id="root"></div>

  <script type="text/babel" data-type="module">
import React, { useState, useEffect, useMemo } from 'react';
import { 
  CheckCircle2, Circle, Clock, Tag, Trash2, Edit2, 
  Plus, Search, SlidersHorizontal, Moon, Sun, 
  LayoutDashboard, CheckSquare, ListTodo, GripVertical,
  Calendar, AlertCircle, CalendarDays, ChevronLeft, ChevronRight, X
} from 'lucide-react';

const PRIORITIES = {
  alta: { label: 'Alta', color: 'text-red-600 bg-red-100 dark:bg-red-900/30 dark:text-red-400', border: 'border-red-500' },
  media: { label: 'Media', color: 'text-amber-600 bg-amber-100 dark:bg-amber-900/30 dark:text-amber-400', border: 'border-amber-500' },
  baja: { label: 'Baja', color: 'text-blue-600 bg-blue-100 dark:bg-blue-900/30 dark:text-blue-400', border: 'border-blue-500' }
};

const INITIAL_TASKS = [
  { id: '1', title: 'Revisar PR del nuevo dashboard', description: 'Aprobar cambios en el repositorio principal', completed: false, priority: 'alta', dueDate: '2026-03-30', time: '10:00', tags: ['Desarrollo', 'Revisión'], createdAt: Date.now() },
  { id: '2', title: 'Actualizar dependencias de seguridad', description: 'Npm audit fix y pruebas E2E', completed: true, priority: 'alta', dueDate: '2026-03-25', time: '14:30', tags: ['DevOps'], createdAt: Date.now() - 86400000 },
  { id: '3', title: 'Diseñar wireframes para app móvil', description: 'Pantallas de login y onboarding', completed: false, priority: 'media', dueDate: '2026-04-05', time: '09:00', tags: ['UI/UX', 'Diseño'], createdAt: Date.now() },
  { id: '4', title: 'Pagar servidores AWS', description: 'Revisar factura mensual', completed: false, priority: 'baja', dueDate: '2026-03-31', time: '11:00', tags: ['Administración'], createdAt: Date.now() },
];

export default function App() {
  const [tasks, setTasks] = useState(() => {
    const saved = localStorage.getItem('taskflow_data');
    return saved ? JSON.parse(saved) : INITIAL_TASKS;
  });
  const [darkMode, setDarkMode] = useState(() => {
    if (typeof window !== 'undefined') {
      return localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
    return false;
  });
  
  const [searchQuery, setSearchQuery] = useState('');
  const [filter, setFilter] = useState('all');
  const [sortBy, setSortBy] = useState('date');
  const [isModalOpen, setIsModalOpen] = useState(false);
  const [editingTask, setEditingTask] = useState(null);
  const [draggedItemIndex, setDraggedItemIndex] = useState(null);
  const [currentView, setCurrentView] = useState('list');
  const [calendarDate, setCalendarDate] = useState(new Date());
  const [selectedDateModal, setSelectedDateModal] = useState(null);
  const [defaultDateForNewTask, setDefaultDateForNewTask] = useState('');

  useEffect(() => {
    localStorage.setItem('taskflow_data', JSON.stringify(tasks));
  }, [tasks]);

  useEffect(() => {
    if (darkMode) {
      document.documentElement.classList.add('dark');
      localStorage.theme = 'dark';
    } else {
      document.documentElement.classList.remove('dark');
      localStorage.theme = 'light';
    }
  }, [darkMode]);

  const handleSaveTask = (taskData) => {
    if (editingTask) {
      setTasks(tasks.map(t => t.id === editingTask.id ? { ...t, ...taskData } : t));
    } else {
      setTasks([{ ...taskData, id: crypto.randomUUID(), completed: false, createdAt: Date.now() }, ...tasks]);
    }
    setIsModalOpen(false);
    setEditingTask(null);
    setDefaultDateForNewTask('');
  };

  const toggleTaskCompletion = (id) => {
    setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
  };

  const deleteTask = (id) => {
    setTasks(tasks.filter(t => t.id !== id));
  };

  const openEditModal = (task) => {
    setEditingTask(task);
    setIsModalOpen(true);
  };

  const handleDragStart = (index) => setDraggedItemIndex(index);
  
  const handleDragOver = (e, index) => {
    e.preventDefault();
    if (draggedItemIndex === null || draggedItemIndex === index) return;
    const newTasks = [...filteredTasks];
    const draggedItem = newTasks[draggedItemIndex];
    const targetItem = filteredTasks[index];
    const reorderedTasks = [...tasks];
    const oldMainIndex = tasks.findIndex(t => t.id === draggedItem.id);
    const newMainIndex = tasks.findIndex(t => t.id === targetItem.id);
    reorderedTasks.splice(oldMainIndex, 1);
    reorderedTasks.splice(newMainIndex, 0, draggedItem);
    setTasks(reorderedTasks);
    setDraggedItemIndex(index);
  };

  const handleDragEnd = () => setDraggedItemIndex(null);

  const filteredTasks = useMemo(() => {
    let result = tasks.filter(task => {
      const matchesSearch = task.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                            task.description.toLowerCase().includes(searchQuery.toLowerCase());
      const matchesFilter = filter === 'all' ? true : filter === 'completed' ? task.completed : !task.completed;
      return matchesSearch && matchesFilter;
    });
    result.sort((a, b) => {
      if (sortBy === 'name') return a.title.localeCompare(b.title);
      if (sortBy === 'priority') {
        const weight = { alta: 3, media: 2, baja: 1 };
        return weight[b.priority] - weight[a.priority];
      }
      return b.createdAt - a.createdAt;
    });
    return result;
  }, [tasks, searchQuery, filter, sortBy]);

  const stats = {
    total: tasks.length,
    completed: tasks.filter(t => t.completed).length,
    pending: tasks.filter(t => !t.completed).length,
    progress: tasks.length ? Math.round((tasks.filter(t => t.completed).length / tasks.length) * 100) : 0
  };

  const currentYear = calendarDate.getFullYear();
  const currentMonth = calendarDate.getMonth();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  
  const getFirstDayOfMonth = () => {
    let day = new Date(currentYear, currentMonth, 1).getDay();
    return day === 0 ? 6 : day - 1; 
  };
  const startDay = getFirstDayOfMonth();

  const prevMonth = () => setCalendarDate(new Date(currentYear, currentMonth - 1, 1));
  const nextMonth = () => setCalendarDate(new Date(currentYear, currentMonth + 1, 1));

  const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
  const dayNames = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];

  const tasksByDate = useMemo(() => {
    return tasks.reduce((acc, task) => {
      if (task.dueDate && !task.completed) {
        const dateStr = task.dueDate;
        if (!acc[dateStr]) acc[dateStr] = [];
        acc[dateStr].push(task);
      }
      return acc;
    }, {});
  }, [tasks]);

  const TaskModal = () => {
    const [formData, setFormData] = useState(editingTask || {
      title: '', description: '', priority: 'media', dueDate: defaultDateForNewTask, time: '', tags: []
    });
    const [tagInput, setTagInput] = useState('');

    const addTag = (e) => {
      if (e.key === 'Enter' && tagInput.trim()) {
        e.preventDefault();
        if (!formData.tags.includes(tagInput.trim())) {
          setFormData({ ...formData, tags: [...formData.tags, tagInput.trim()] });
        }
        setTagInput('');
      }
    };

    const removeTag = (tagToRemove) => {
      setFormData({ ...formData, tags: formData.tags.filter(tag => tag !== tagToRemove) });
    };

    return (
      <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex justify-center items-end md:items-center z-[70] p-0 md:p-4">
        <div className="bg-white dark:bg-slate-800 rounded-t-2xl md:rounded-2xl shadow-xl w-full md:max-w-lg overflow-hidden animate-in fade-in zoom-in-95 duration-200 max-h-[92vh] flex flex-col">
          <div className="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50 flex-shrink-0">
            <h2 className="text-xl font-semibold text-slate-800 dark:text-white">
              {editingTask ? 'Editar Tarea' : 'Nueva Tarea'}
            </h2>
            <button onClick={() => { setIsModalOpen(false); setEditingTask(null); }} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 text-2xl leading-none">&times;</button>
          </div>
          
          <div className="p-6 space-y-4 overflow-y-auto flex-1">
            <div>
              <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Título</label>
              <input 
                type="text" autoFocus
                className="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all text-base"
                value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})}
                placeholder="Ej. Revisar métricas mensuales"
              />
            </div>
            
            <div>
              <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Descripción</label>
              <textarea 
                className="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all resize-none text-base"
                rows="3" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})}
              />
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Prioridad</label>
                <select 
                  className="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 text-base"
                  value={formData.priority} onChange={e => setFormData({...formData, priority: e.target.value})}
                >
                  <option value="alta">Alta</option>
                  <option value="media">Media</option>
                  <option value="baja">Baja</option>
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Fecha</label>
                <input 
                  type="date"
                  className="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 text-base"
                  value={formData.dueDate} onChange={e => setFormData({...formData, dueDate: e.target.value})}
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Hora</label>
                <input 
                  type="time"
                  className="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 text-base"
                  value={formData.time || ''} onChange={e => setFormData({...formData, time: e.target.value})}
                />
              </div>
            </div>

            <div>
              <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Etiquetas</label>
              <input 
                type="text"
                className="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 text-base"
                value={tagInput} onChange={e => setTagInput(e.target.value)} onKeyDown={addTag}
                placeholder="Escribe y pulsa Enter para añadir..."
              />
              {formData.tags.length > 0 && (
                <div className="flex flex-wrap gap-2 mt-2">
                  {formData.tags.map(tag => (
                    <span key={tag} className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800 dark:bg-indigo-900/40 dark:text-indigo-300">
                      {tag}
                      <button type="button" onClick={() => removeTag(tag)} className="ml-1 text-indigo-600 hover:text-indigo-900">&times;</button>
                    </span>
                  ))}
                </div>
              )}
            </div>
          </div>
          
          <div className="px-6 py-4 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3 flex-shrink-0" style={{paddingBottom:'calc(1rem + env(safe-area-inset-bottom))'}}>
            <button onClick={() => { setIsModalOpen(false); setEditingTask(null); }} className="px-4 py-3 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors">
              Cancelar
            </button>
            <button 
              onClick={() => handleSaveTask(formData)}
              disabled={!formData.title.trim()}
              className="px-6 py-3 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 rounded-lg shadow-sm"
            >
              Guardar Tarea
            </button>
          </div>
        </div>
      </div>
    );
  };

  const DayDetailsModal = () => {
    if (!selectedDateModal) return null;
    
    const dayTasks = tasks.filter(t => t.dueDate === selectedDateModal).sort((a, b) => {
      const timeA = a.time || '23:59';
      const timeB = b.time || '23:59';
      return timeA.localeCompare(timeB);
    });

    const [year, month, day] = selectedDateModal.split('-');
    const dateObj = new Date(year, month - 1, day);
    const formattedDate = dateObj.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });

    const handleNewTaskForDay = () => {
      setDefaultDateForNewTask(selectedDateModal);
      setEditingTask(null);
      setSelectedDateModal(null);
      setIsModalOpen(true);
    };

    return (
      <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex justify-center items-end md:items-center z-[60] p-0 md:p-4 animate-in fade-in duration-200">
        <div className="bg-white dark:bg-slate-800 rounded-t-2xl md:rounded-2xl shadow-xl w-full md:max-w-lg overflow-hidden flex flex-col max-h-[85vh]">
          <div className="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50 flex-shrink-0">
            <h2 className="text-xl font-semibold text-slate-800 dark:text-white capitalize">
              {formattedDate}
            </h2>
            <button onClick={() => setSelectedDateModal(null)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 text-2xl leading-none">&times;</button>
          </div>
          
          <div className="p-6 overflow-y-auto flex-1 space-y-3">
            {dayTasks.length === 0 ? (
              <p className="text-center text-slate-500 dark:text-slate-400 py-8">No hay eventos para este día.</p>
            ) : (
              dayTasks.map(task => (
                <div key={task.id} className={`group flex items-center gap-3 p-3 border rounded-xl transition-all ${task.completed ? 'opacity-60 bg-slate-50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 shadow-sm'}`}>
                  <button 
                    onClick={() => toggleTaskCompletion(task.id)}
                    className={`flex-shrink-0 ${task.completed ? 'text-green-500' : 'text-slate-300 hover:text-indigo-500 dark:text-slate-600 dark:hover:text-indigo-400'}`}
                  >
                    {task.completed ? <CheckCircle2 className="w-5 h-5 fill-green-50" /> : <Circle className="w-5 h-5" />}
                  </button>
                  <div className="flex-1 min-w-0">
                    <div className="flex justify-between items-start">
                      <span className={`text-sm font-medium block truncate ${task.completed ? 'line-through text-slate-500' : 'text-slate-900 dark:text-slate-100'}`}>
                        {task.title}
                      </span>
                      {task.time && (
                        <span className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 px-2 py-0.5 rounded ml-2 whitespace-nowrap">
                          {task.time}
                        </span>
                      )}
                    </div>
                  </div>
                  <div className="flex items-center gap-1">
                    <button onClick={() => { setSelectedDateModal(null); openEditModal(task); }} className="p-1.5 text-slate-400 hover:text-indigo-600 rounded-lg transition-colors">
                      <Edit2 className="w-4 h-4" />
                    </button>
                    <button onClick={() => deleteTask(task.id)} className="p-1.5 text-slate-400 hover:text-red-600 rounded-lg transition-colors">
                      <Trash2 className="w-4 h-4" />
                    </button>
                  </div>
                </div>
              ))
            )}
          </div>
          
          <div className="px-6 py-4 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-between gap-3 flex-shrink-0" style={{paddingBottom:'calc(1rem + env(safe-area-inset-bottom))'}}>
            <button onClick={() => setSelectedDateModal(null)} className="px-4 py-3 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors">
              Cerrar
            </button>
            <button 
              onClick={handleNewTaskForDay}
              className="flex items-center gap-2 px-4 py-3 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm"
            >
              <Plus className="w-4 h-4" /> Añadir Tarea
            </button>
          </div>
        </div>
      </div>
    );
  };

  // Helper para clases del bottom nav
  const bnClass = (active) =>
    `flex flex-col items-center justify-center gap-1 flex-1 py-2 rounded-lg transition-colors ${active ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 dark:text-slate-500'}`;

  return (
    <div className="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans flex flex-col md:flex-row selection:bg-indigo-100 selection:text-indigo-900">
      
      {/* SIDEBAR — solo visible en md y superiores */}
      <aside className="hidden md:flex md:w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex-col flex-shrink-0">
        <div className="p-6 flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
            <CheckSquare className="text-white w-5 h-5" />
          </div>
          <span className="text-xl font-bold tracking-tight">TaskFlow</span>
        </div>

        <nav className="flex-1 px-4 space-y-1">
          <button onClick={() => { setFilter('all'); setCurrentView('list'); }} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors ${currentView === 'list' && filter === 'all' ? 'bg-indigo-50 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-400' : 'text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700/50'}`}>
            <LayoutDashboard className="w-4 h-4" /> Todas las tareas
          </button>
          <button onClick={() => { setFilter('active'); setCurrentView('list'); }} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors ${currentView === 'list' && filter === 'active' ? 'bg-indigo-50 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-400' : 'text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700/50'}`}>
            <ListTodo className="w-4 h-4" /> Pendientes
          </button>
          <button onClick={() => { setFilter('completed'); setCurrentView('list'); }} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors ${currentView === 'list' && filter === 'completed' ? 'bg-indigo-50 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-400' : 'text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700/50'}`}>
            <CheckCircle2 className="w-4 h-4" /> Completadas
          </button>
          <div className="py-2"><div className="border-t border-slate-200 dark:border-slate-700/50 my-1"></div></div>
          <button onClick={() => setCurrentView('calendar')} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors ${currentView === 'calendar' ? 'bg-indigo-50 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-400' : 'text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700/50'}`}>
            <CalendarDays className="w-4 h-4" /> Calendario
          </button>
        </nav>

        <div className="p-6 mt-auto">
          <h3 className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Progreso Global</h3>
          <div className="space-y-3">
            <div className="flex justify-between text-sm">
              <span className="text-slate-500 dark:text-slate-400">Completadas</span>
              <span className="font-medium">{stats.completed}/{stats.total}</span>
            </div>
            <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2 overflow-hidden">
              <div className="bg-indigo-500 h-2 rounded-full transition-all duration-500" style={{ width: `${stats.progress}%` }}></div>
            </div>
          </div>
        </div>
      </aside>

      {/* ÁREA PRINCIPAL */}
      <main className="flex-1 flex flex-col min-h-screen overflow-hidden">

        {/* TOPBAR */}
        <header className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 h-16 px-4 md:px-6 flex items-center justify-between flex-shrink-0">
          {/* Logo visible solo en móvil */}
          <div className="flex items-center gap-2 md:hidden flex-shrink-0">
            <div className="w-7 h-7 rounded-lg bg-indigo-600 flex items-center justify-center">
              <CheckSquare className="text-white w-4 h-4" />
            </div>
            <span className="text-base font-bold tracking-tight">TaskFlow</span>
          </div>

          <div className="flex-1 max-w-xl flex items-center gap-4 md:ml-0 ml-3">
            <div className="relative w-full">
              <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
              <input 
                type="text" placeholder="Buscar tareas..." 
                className="w-full pl-10 pr-4 py-2 bg-slate-100 dark:bg-slate-900 border-transparent focus:bg-white dark:focus:bg-slate-700 rounded-xl text-sm transition-all"
                value={searchQuery} onChange={(e) => { setSearchQuery(e.target.value); setCurrentView('list'); }}
              />
            </div>
          </div>

          <div className="flex items-center gap-2 md:gap-3 ml-2 md:ml-4">
            <button onClick={() => setDarkMode(!darkMode)} className="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 bg-slate-100 dark:bg-slate-700/50 rounded-lg">
              {darkMode ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
            </button>
            <button 
              onClick={() => { setEditingTask(null); setDefaultDateForNewTask(''); setIsModalOpen(true); }}
              className="hidden md:flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm"
            >
              <Plus className="w-4 h-4" /> Nueva Tarea
            </button>
          </div>
        </header>

        {/* CONTENIDO */}
        {currentView === 'list' ? (
          <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50 dark:bg-slate-900 pb-24 md:pb-6">
            <div className="max-w-4xl mx-auto">
              <div className="mb-6">
                <h1 className="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Mis tareas</h1>
                <p className="text-slate-500 dark:text-slate-400 text-sm mt-1">{stats.pending} pendientes · {stats.completed} completadas</p>
              </div>

              {/* Progreso en móvil */}
              <div className="md:hidden mb-5 bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700">
                <div className="flex justify-between text-sm mb-2">
                  <span className="text-slate-500 dark:text-slate-400 font-medium">Progreso</span>
                  <span className="font-semibold text-indigo-600">{stats.completed}/{stats.total}</span>
                </div>
                <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2 overflow-hidden">
                  <div className="bg-indigo-500 h-2 rounded-full transition-all duration-500" style={{ width: `${stats.progress}%` }}></div>
                </div>
              </div>

              {filteredTasks.length === 0 ? (
                <div className="text-center py-20 bg-white dark:bg-slate-800 rounded-2xl border border-dashed border-slate-200 dark:border-slate-700">
                  <div className="text-4xl mb-3">✅</div>
                  <h3 className="text-lg font-medium text-slate-700 dark:text-slate-300">No hay tareas</h3>
                  <button onClick={() => { setEditingTask(null); setIsModalOpen(true); }} className="text-indigo-600 font-medium text-sm hover:underline mt-2 block mx-auto">Crear nueva tarea</button>
                </div>
              ) : (
                <div className="space-y-3">
                  {filteredTasks.map((task, index) => (
                    <div 
                      key={task.id} draggable onDragStart={() => handleDragStart(index)} onDragOver={(e) => handleDragOver(e, index)} onDragEnd={handleDragEnd}
                      className={`group flex items-start gap-3 md:gap-4 p-4 bg-white dark:bg-slate-800 rounded-xl border transition-all ${draggedItemIndex === index ? 'opacity-50' : 'border-slate-200 dark:border-slate-700 shadow-sm'} ${task.completed ? 'opacity-70 bg-slate-50 dark:bg-slate-800/50' : ''}`}
                    >
                      <div className="mt-1 cursor-grab text-slate-300 hidden md:block"><GripVertical className="w-5 h-5" /></div>
                      <button onClick={() => toggleTaskCompletion(task.id)} className={`mt-0.5 flex-shrink-0 ${task.completed ? 'text-green-500' : 'text-slate-300 hover:text-indigo-500'}`}>
                        {task.completed ? <CheckCircle2 className="w-6 h-6 fill-green-50" /> : <Circle className="w-6 h-6" />}
                      </button>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-start justify-between gap-2 mb-1">
                          <h3 className={`text-base font-medium ${task.completed ? 'line-through text-slate-400' : 'text-slate-900 dark:text-slate-100'}`}>{task.title}</h3>
                          <span className={`flex-shrink-0 px-2 py-0.5 rounded text-[10px] font-bold uppercase border ${PRIORITIES[task.priority].color} ${PRIORITIES[task.priority].border}`}>
                            {PRIORITIES[task.priority].label}
                          </span>
                        </div>
                        {task.description && <p className="text-sm text-slate-500 dark:text-slate-400 line-clamp-1 mb-2">{task.description}</p>}
                        <div className="flex items-center flex-wrap gap-2 text-xs text-slate-500">
                          {task.dueDate && <div className="flex items-center gap-1"><Calendar className="w-3.5 h-3.5" />{task.dueDate}{task.time ? ` · ${task.time}` : ''}</div>}
                          {task.tags?.map(tag => <span key={tag} className="bg-slate-100 dark:bg-slate-700 px-1.5 py-0.5 rounded">{tag}</span>)}
                        </div>
                      </div>
                      {/* Acciones siempre visibles en móvil */}
                      <div className="flex items-center gap-1 md:opacity-0 md:group-hover:opacity-100 transition-opacity flex-shrink-0">
                        <button onClick={() => openEditModal(task)} className="p-2 text-slate-400 hover:text-indigo-600 rounded-lg"><Edit2 className="w-4 h-4" /></button>
                        <button onClick={() => deleteTask(task.id)} className="p-2 text-slate-400 hover:text-red-600 rounded-lg"><Trash2 className="w-4 h-4" /></button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        ) : (
          <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50 dark:bg-slate-900 pb-24 md:pb-6">
            <div className="max-w-5xl mx-auto">
              <div className="flex justify-between items-center mb-6">
                <h1 className="text-2xl font-bold">{monthNames[currentMonth]} {currentYear}</h1>
                <div className="flex gap-2">
                  <button onClick={prevMonth} className="p-2 bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm"><ChevronLeft className="w-5 h-5"/></button>
                  <button onClick={nextMonth} className="p-2 bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm"><ChevronRight className="w-5 h-5"/></button>
                </div>
              </div>

              <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div className="grid grid-cols-7 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50">
                  {dayNames.map(day => <div key={day} className="py-3 text-center text-xs font-semibold text-slate-500 uppercase">{day}</div>)}
                </div>
                <div className="grid grid-cols-7 bg-slate-100 dark:bg-slate-700/50 gap-[1px]">
                  {Array.from({ length: startDay }).map((_, i) => <div key={`e-${i}`} className="min-h-[60px] md:min-h-[100px] bg-slate-50/50 dark:bg-slate-800/30"></div>)}
                  {Array.from({ length: daysInMonth }).map((_, i) => {
                    const day = i + 1;
                    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const dayTasks = tasksByDate[dateStr] || [];
                    const isToday = new Date().toDateString() === new Date(currentYear, currentMonth, day).toDateString();
                    return (
                      <div key={day} onClick={() => setSelectedDateModal(dateStr)} className={`min-h-[60px] md:min-h-[100px] bg-white dark:bg-slate-800 p-1 md:p-2 hover:bg-slate-50 dark:hover:bg-slate-700/50 flex flex-col cursor-pointer ${isToday ? 'bg-indigo-50/30' : ''}`}>
                        <span className={`text-xs md:text-sm font-medium w-6 h-6 flex items-center justify-center rounded-full mb-1 ${isToday ? 'bg-indigo-600 text-white' : ''}`}>{day}</span>
                        <div className="space-y-0.5 flex-1 overflow-hidden">
                          {dayTasks.slice(0, 2).map(t => (
                            <div key={t.id} className={`text-[9px] md:text-[10px] p-0.5 md:p-1 rounded truncate border ${PRIORITIES[t.priority].color} ${PRIORITIES[t.priority].border}`}>
                              {t.title}
                            </div>
                          ))}
                          {dayTasks.length > 2 && <div className="text-[9px] text-slate-400 pl-0.5">+{dayTasks.length - 2} más</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        )}
      </main>

      {/* FAB — móvil, encima del bottom nav */}
      <button 
        onClick={() => { setEditingTask(null); setDefaultDateForNewTask(''); setIsModalOpen(true); }}
        className="md:hidden fixed bottom-20 right-4 w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-indigo-500/40 hover:bg-indigo-700 z-40 transition-transform active:scale-95"
        style={{marginBottom:'env(safe-area-inset-bottom)'}}
      >
        <Plus className="w-6 h-6" />
      </button>

      {/* BOTTOM NAV — solo móvil */}
      <nav
        className="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 flex items-center px-2 z-30"
        style={{height:'60px', paddingBottom:'env(safe-area-inset-bottom)'}}
      >
        <button onClick={() => { setFilter('all'); setCurrentView('list'); }} className={bnClass(currentView==='list'&&filter==='all')}>
          <LayoutDashboard className="w-5 h-5" />
          <span className="text-[10px] font-semibold">Todas</span>
        </button>
        <button onClick={() => { setFilter('active'); setCurrentView('list'); }} className={bnClass(currentView==='list'&&filter==='active')}>
          <ListTodo className="w-5 h-5" />
          <span className="text-[10px] font-semibold">Pendientes</span>
        </button>
        <button onClick={() => { setFilter('completed'); setCurrentView('list'); }} className={bnClass(currentView==='list'&&filter==='completed')}>
          <CheckCircle2 className="w-5 h-5" />
          <span className="text-[10px] font-semibold">Hechas</span>
        </button>
        <button onClick={() => setCurrentView('calendar')} className={bnClass(currentView==='calendar')}>
          <CalendarDays className="w-5 h-5" />
          <span className="text-[10px] font-semibold">Calendario</span>
        </button>
      </nav>

      {isModalOpen && <TaskModal />}
      {selectedDateModal && <DayDetailsModal />}
    </div>
  );
}

import { createRoot } from 'react-dom/client';
const root = createRoot(document.getElementById('root'));
root.render(<App />);

requestAnimationFrame(() => {
  const splash = document.getElementById('splash');
  if (splash) { splash.classList.add('hidden'); setTimeout(() => splash.remove(), 400); }
});
  </script>

<!-- Ko-fi widget flotante -->
<script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>
  (function() {
    function positionKoFi() {
      document.querySelectorAll('*').forEach(function(el) {
        try {
          if (window.getComputedStyle(el).position !== 'fixed') return;
          var src = (el.getAttribute('src') || '').toLowerCase();
          var id  = (el.id || '').toLowerCase();
          var cls = (el.className || '').toString().toLowerCase();
          if (src.includes('ko-fi') || id.includes('kofi') || cls.includes('kofi')) {
            el.style.right  = '24px';
            el.style.left   = 'auto';
            el.style.bottom = '24px';
            el.style.top    = 'auto';
            el.style.zIndex = '1200';
          }
        } catch(e) {}
      });
    }

    var observer = new MutationObserver(positionKoFi);
    observer.observe(document.body, { childList: true, subtree: true });
    setTimeout(function() { observer.disconnect(); }, 8000);

    kofiWidgetOverlay.draw('tasklity', {
      'type': 'floating-chat',
      'floating-chat.donateButton.text': '¿Más productivo?',
      'floating-chat.donateButton.background-color': '#29abe0',
      'floating-chat.donateButton.text-color': '#fff'
    });
  })();
</script>
